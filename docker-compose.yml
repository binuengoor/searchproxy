services:
  searchproxy:
    image: searchproxy:latest
    container_name: searchproxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    # Optional: use host network if upstream services (upstream-host) are unreachable
    # from the default bridge. Uncomment on Linux hosts only.
    # network_mode: host
