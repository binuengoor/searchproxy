services:
  searchproxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: searchproxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SEARCHPROXY_API_KEY=${SEARCHPROXY_API_KEY:-change-me-in-production}
    depends_on:
      crawl4ai:
        condition: service_healthy
    networks:
      - searchproxy-net
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    ports:
      - "11235:11235"
    volumes:
      - /dev/shm:/dev/shm
    shm_size: 1g
    environment:
      - PUID=1000
      - PGID=1000
    networks:
      - searchproxy-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

networks:
  searchproxy-net:
    driver: bridge
