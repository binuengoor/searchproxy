services:
  searchproxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: searchproxy:latest
    container_name: searchproxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=8080
    restart: unless-stopped
