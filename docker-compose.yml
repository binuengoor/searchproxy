services:
  searchproxy:
    image: searchproxy:latest
    container_name: searchproxy
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    # Use public DNS to avoid Pi-hole/AdGuard blocking anti-bot APIs
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Optional: use host network if upstream services on the host are unreachable
    # from the default bridge. Uncomment on Linux hosts only.
    # network_mode: host
